name: 'Dependency Review'
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  bun-action-detection:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Submit JavaScript dependencies
        uses: advanced-security/npm-dependency-submission-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    runs-on: ubuntu-latest
    needs: bun-action-detection
    if: github.event_name == 'pull_request'
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
          fail-on-severity: moderate
          allow-licenses:
            BSD-2-Clause-Patent,
            ADSL,
            Apache-2.0,
            APAFML,
            BSD-1-Clause,
            BSD-2-Clause,
            BSD-2-Clause-FreeBSD,
            BSD-2-Clause-NetBSD,
            BSL-1.0,
            DSDP,
            ECL-1.0,
            ECL-2.0,
            ImageMagick,
            ISC,
            Linux-OpenIB,
            MIT,
            MS-PL,
            Mup,
            PostgreSQL,
            Spencer-99,
            UPL-1.0,
            Xerox,
            0BSD,
            AFL-1.1,
            AFL-1.2,
            AFL-2.0,
            AFL-2.1,
            AFL-3.0,
            AMDPLPA,
