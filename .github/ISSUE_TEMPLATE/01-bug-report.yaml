name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug"]

type: bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong? Also tell us, what did you expect to happen?
    validations:
      required: true

  - type: input
    id: what-feature
    attributes:
      label: What feature were you using?
      description: List one or more features that were enabled when you found the bug

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell

  - type: textarea
    id: how-reproduce
    attributes:
      label: How can we reproduce the bug?
      description: Tell us how we could reproduce the bug, if possible.
